name: Update RPi TF-A

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release Tag to fetch (optional, default: latest)'
        required: false
      platforms:
        description: 'Comma-separated list of platforms to update (default: rpi3,rpi4,rpi5)'
        required: false
  workflow_run:
    workflows: ["TF-A - Raspberry Pi build"]
    types:
      - completed

jobs:
  update-tfa:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar xz-utils rsync git jq

      - name: Set variables
        run: |
          if [ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
            PLATFORMS="${{ github.event.inputs.platforms }}"
          else
            RELEASE_TAG=""
            PLATFORMS="rpi3,rpi4,rpi5"
          fi

          # Fallback: latest release if not specified
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG=$(curl -s https://api.github.com/repos/Xemorph/pitf/releases/latest | jq -r '.tag_name')
          fi

          # Fallback platforms
          if [ -z "$PLATFORMS" ]; then
            PLATFORMS="rpi3,rpi4,rpi5"
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "PLATFORMS=$PLATFORMS" >> $GITHUB_ENV
          echo "Using release: $RELEASE_TAG"
          echo "Platforms: $PLATFORMS"

      - name: Download TF-A artifacts
        run: |
          mkdir -p tmp_artifacts
          cd tmp_artifacts
          IFS=',' read -ra PLAT <<< "$PLATFORMS"
          for platform in "${PLAT[@]}"; do
            URL="https://github.com/Xemorph/pitf/releases/download/$RELEASE_TAG/${platform}-tf-a.tar.xz"
            echo "Downloading $URL"
            curl -L -o ${platform}-tf-a.tar.xz $URL
          done
          cd ..

      - name: Extract artifacts
        run: |
          mkdir -p tmp_extracted
          IFS=',' read -ra PLAT <<< "$PLATFORMS"
          for platform in "${PLAT[@]}"; do
            mkdir -p tmp_extracted/$platform
            tar -xJf tmp_artifacts/${platform}-tf-a.tar.xz -C tmp_extracted/$platform
          done

      - name: Sync artifacts to Platform folders
        run: |
          mkdir -p Platform/RaspberryPi/RPi3/TrustedFirmware
          mkdir -p Platform/RaspberryPi/RPi4/TrustedFirmware
          mkdir -p Platform/RaspberryPi/RPi5/TrustedFirmware

          IFS=',' read -ra PLAT <<< "$PLATFORMS"
          for platform in "${PLAT[@]}"; do
            case "$platform" in
              rpi3)
                rsync -a --delete tmp_extracted/rpi3/ Platform/RaspberryPi/RPi3/TrustedFirmware/
                ;;
              rpi4)
                rsync -a --delete tmp_extracted/rpi4/ Platform/RaspberryPi/RPi4/TrustedFirmware/
                ;;
              rpi5)
                rsync -a --delete tmp_extracted/rpi5/ Platform/RaspberryPi/RPi5/TrustedFirmware/
                ;;
            esac
          done

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Platform/RaspberryPi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Platform/RasppberryPi: update to TF-A $RELEASE_TAG"
            git push origin master